<main>
  <page-loading *ngIf="loading" class="card_loading"></page-loading>

  <section *ngIf="!loading">
    <app-card-pokemon
      *ngFor="let pok of pokemons; let idx = index"
      routerLink="/pokemon/{{ pok.name }}"
      [pokemon]="pok"
      [index]="idx + 1"
    ></app-card-pokemon>

    <div class="empty" *ngFor="let obj of [].constructor(10)"></div>
  </section>
</main>
